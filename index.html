<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#2a1830;
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-user-select:none; user-select:none; touch-action:none; }
  #game { display:block; width:100vw; height:100vh; touch-action:none; }

<body>
<canvas id="game"></canvas>
<script>
(function () {
  "use strict";
  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");

  var W=0,H=0,DPR=1,S=1;
  var cx=0,cy=0;
  var stepW=42, stepH=30;
  var blockW=64, blockH=30, depthX=20, depthY=-14;

  // ---- state ----
  var STATE="title";           // title | play | over
  var stairs=[];               // {col,row,dir,gem}
  var pos=0, face=1;
  var camCol=0, camRow=0;
  var score=0, best=0, height=0;
  var energy=1, drainBase=0.26;
  var hopT=1, squash=0, landT=1;
  var fallVX=0, fallVY=0, fallX=0, fallY=0, fallRot=0;
  var overAt=0, shake=0, flashT=0;
  var particles=[], pops=[], gemsFx=[];
  var clouds=[], stars=[];
  var muted=false, lastTime=0, hintLeft=6;
  var walkPhase=0;

  try { best = parseInt(localStorage.getItem("princess_stairs_best")||"0",10)||0; } catch(e){}

  // ---- audio ----
  var AC=null;
  function ac(){ if(AC===null){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=false;} } return AC; }
  function tone(freq,dur,type,vol){
    if(muted) return; var a=ac(); if(!a) return;
    try{ var o=a.createOscillator(),g=a.createGain();
      o.type=type||"sine"; o.frequency.value=freq; g.gain.value=vol||0.05;
      o.connect(g); g.connect(a.destination); var t=a.currentTime;
      g.gain.setValueAtTime(g.gain.value,t); g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
      o.start(t); o.stop(t+(dur||0.12));
    }catch(e){}
  }
  var scale=[523,587,659,698,784,880,988,1046];
  function stepSound(n){ tone(scale[Math.min(scale.length-1, n%scale.length)],0.10,"triangle",0.05); tone(160,0.05,"square",0.03); }
  function gemSound(){ tone(1200,0.09,"sine",0.06); setTimeout(function(){tone(1600,0.10,"sine",0.05);},60); }
  function overSound(){ tone(300,0.2,"sawtooth",0.06); setTimeout(function(){tone(200,0.3,"sine",0.06);},120); }

  // ---- sizing ----
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    canvas.width=Math.floor(W*DPR); canvas.height=Math.floor(H*DPR);
    canvas.style.width=W+"px"; canvas.style.height=H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    S=Math.max(0.72, Math.min(W/390, H/760));
    stepW=44*S; stepH=30*S;
    blockW=70*S; blockH=30*S; depthX=blockW*0.32; depthY=-blockW*0.20;
    cx=W/2; cy=H*0.60;
    buildSky();
  }
  window.addEventListener("resize", resize);

  function buildSky(){
    clouds=[]; for(var i=0;i<6;i++){ clouds.push({x:Math.random()*W, y:Math.random()*H*0.7, s:(50+Math.random()*80)*S, sp:(4+Math.random()*8)*S, a:0.5+Math.random()*0.4}); }
    stars=[]; for(var j=0;j<40;j++){ stars.push({x:Math.random()*W, y:Math.random()*H, r:(0.6+Math.random()*1.6)*S, tw:Math.random()*Math.PI*2}); }
  }

  // ---- game setup ----
  function newStair(prev, idx){
    var d = Math.random()<0.5?-1:1;
    var gem = idx>3 && Math.random()<0.16;
    return { col:prev.col+d, row:prev.row+1, dir:d, gem:gem, gemGot:false };
  }
  function ensureStairs(){
    while(stairs.length < pos+16){
      stairs.push(newStair(stairs[stairs.length-1], stairs.length));
    }
  }
  function trimStairs(){ if(pos>10){ var drop=pos-5; stairs.splice(0,drop); pos-=drop; } }

  function resetGame(){
    stairs=[{col:0,row:0,dir:0,gem:false,gemGot:false}];
    pos=0; face=1; ensureStairs();
    camCol=0; camRow=0;
    score=0; height=0; energy=1;
    hopT=1; squash=0; landT=1;
    fallX=fallY=fallRot=0; fallVX=fallVY=0;
    particles=[]; pops=[]; gemsFx=[];
    shake=0; flashT=0; hintLeft=6; walkPhase=0;
  }

  // ---- actions ----
  function startGame(){ resetGame(); STATE="play"; }
  function doAction(turn){
    ac();
    if(STATE==="title"){ startGame(); return; }
    if(STATE==="over"){ if(performance.now()-overAt>500){ STATE="title"; } return; }
    // playing
    ensureStairs();
    var intended = turn ? -face : face;
    var next = stairs[pos+1];
    if(next && next.dir===intended){
      face = intended;
      pos++; score++; height++;
      if(hintLeft>0) hintLeft--;
      hopT=0; landT=0; squash=0.35;
      energy=Math.min(1, energy + 0.11);
      spawnDust();
      stepSound(score);
      addPop("+1", "#fff");
      if(next.gem && !next.gemGot){
        next.gemGot=true; score+=4; energy=Math.min(1,energy+0.14);
        gemBurst(); gemSound(); addPop("+5", "#8ef0ff");
      }
      walkPhase++;
      ensureStairs(); trimStairs();
    } else {
      gameOver();
    }
  }
  function gameOver(){
    STATE="over"; overAt=performance.now();
    fallVX=face*140*S; fallVY=-260*S; fallRot=0; fallX=0; fallY=0;
    shake=1; flashT=0.25;
    if(score>best){ best=score; try{localStorage.setItem("princess_stairs_best",String(best));}catch(e){} }
    overSound();
  }

  // ---- effects ----
  function feet(){ var p=stairScreen(pos); return {x:p.x+depthX*0.5, y:p.y+depthY*0.5}; }
  function spawnDust(){
    var f=feet();
    for(var i=0;i<8;i++){
      particles.push({x:f.x,y:f.y,vx:(Math.random()-0.5)*130*S,vy:(-30-Math.random()*90)*S,
        life:0.4+Math.random()*0.3,t:0,r:(2+Math.random()*3)*S,c:"#ffffff"});
    }
  }
  function gemBurst(){
    var f=feet();
    for(var i=0;i<12;i++){
      var a=Math.random()*Math.PI*2, sp=(60+Math.random()*160)*S;
      gemsFx.push({x:f.x,y:f.y-20*S,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40*S,
        life:0.6+Math.random()*0.3,t:0,r:(2.5+Math.random()*3)*S});
    }
  }
  function addPop(txt,color){ var f=feet(); pops.push({x:f.x,y:f.y-40*S,txt:txt,c:color,t:0,life:0.8}); }

  // ---- input ----
  function pointer(x){ doAction(x < W/2); }   // left half = turn, right half = go straight
  canvas.addEventListener("touchstart", function(e){ e.preventDefault();
    if(e.changedTouches&&e.changedTouches.length){ pointer(e.changedTouches[0].clientX); } }, {passive:false});
  canvas.addEventListener("mousedown", function(e){
    var r=22*S, bx=W-r-14*S, by=r+14*S, dx=e.clientX-bx, dy=e.clientY-by;
    if(dx*dx+dy*dy<=r*r){ muted=!muted; return; }
    e.preventDefault(); pointer(e.clientX); });
  window.addEventListener("keydown", function(e){
    if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A"){ e.preventDefault(); doAction(true); }
    else if(e.key==="ArrowRight"||e.key==="d"||e.key==="D"||e.key===" "||e.key==="ArrowUp"){ e.preventDefault(); doAction(false); }
    else if(e.key==="m"||e.key==="M"){ muted=!muted; }
  });

  // ---- helpers ----
  function stairScreen(i){ var st=stairs[i]; return { x:cx+(st.col-camCol)*stepW, y:cy-(st.row-camRow)*stepH }; }
  function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function poly(pts){ ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]); ctx.closePath(); }

  // ---- update ----
  function update(dt){
    var target=stairs[pos];
    var k=Math.min(1,dt*12);
    camCol+=(target.col-camCol)*k;
    camRow+=(target.row-camRow)*k;
    hopT=Math.min(1,hopT+dt*7);
    landT=Math.min(1,landT+dt*6);
    squash*=Math.pow(0.001,dt);
    if(shake>0) shake=Math.max(0,shake-dt*2.2);
    if(flashT>0) flashT-=dt;

    for(var i=0;i<clouds.length;i++){ var c=clouds[i]; c.x-=c.sp*dt; if(c.x<-c.s) { c.x=W+c.s; c.y=Math.random()*H*0.7; } }
    for(var s=0;s<stars.length;s++){ stars[s].tw+=dt*2; }

    for(var p=particles.length-1;p>=0;p--){ var q=particles[p]; q.t+=dt; q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=420*S*dt; if(q.t>=q.life) particles.splice(p,1); }
    for(var g=gemsFx.length-1;g>=0;g--){ var gg=gemsFx[g]; gg.t+=dt; gg.x+=gg.vx*dt; gg.y+=gg.vy*dt; gg.vy+=300*S*dt; if(gg.t>=gg.life) gemsFx.splice(g,1); }
    for(var o=pops.length-1;o>=0;o--){ var pp=pops[o]; pp.t+=dt; pp.y-=40*S*dt; if(pp.t>=pp.life) pops.splice(o,1); }

    if(STATE==="play"){
      var drain=drainBase + score*0.0022; if(drain>0.7) drain=0.7;
      energy-=drain*dt;
      if(energy<=0){ energy=0; gameOver(); }
    } else if(STATE==="over"){
      fallX+=fallVX*dt; fallY+=fallVY*dt; fallVY+=900*S*dt; fallRot+=dt*7;
    }
  }

  // ---- draw: background ----
  function drawBackground(){
    var climb = camRow*0.02;
    var t1 = mix([255,214,236],[150,190,255], Math.min(1,climb));
    var t2 = mix([255,238,247],[210,225,255], Math.min(1,climb));
    var g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, rgb(t1)); g.addColorStop(1, rgb(t2));
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // stars (fade in as you climb)
    var sa=Math.min(0.7, climb*0.9);
    if(sa>0.02){ for(var i=0;i<stars.length;i++){ var st=stars[i];
      ctx.globalAlpha=sa*(0.4+0.6*Math.abs(Math.sin(st.tw))); ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,7); ctx.fill(); } ctx.globalAlpha=1; }
    // clouds
    for(var c=0;c<clouds.length;c++){ var cl=clouds[c]; ctx.globalAlpha=cl.a*0.6;
      ctx.fillStyle="#ffffff"; cloud(cl.x,cl.y,cl.s); }
    ctx.globalAlpha=1;
  }
  function cloud(x,y,s){ ctx.beginPath();
    ctx.arc(x,y,s*0.5,0,7); ctx.arc(x+s*0.42,y+s*0.06,s*0.38,0,7);
    ctx.arc(x-s*0.42,y+s*0.06,s*0.34,0,7); ctx.arc(x+s*0.1,y-s*0.2,s*0.34,0,7); ctx.fill(); }

  // ---- draw: stair block ----
  var PALS=[
    {top:"#ffd6e8",front:"#ff9ec7",side:"#ef79ac"},
    {top:"#e2d4ff",front:"#b9a2ff",side:"#997ef0"}
  ];
  function drawBlock(i){
    var p=stairScreen(i); var st=stairs[i];
    var half=blockW/2, sx=p.x, sy=p.y;
    if(sy>H+blockH*3 || sy<-blockH*3) return;
    var pal=PALS[((st.row%2)+2)%2];
    // right side
    ctx.fillStyle=pal.side;
    poly([[sx+half,sy],[sx+half+depthX,sy+depthY],[sx+half+depthX,sy+depthY+blockH],[sx+half,sy+blockH]]); ctx.fill();
    // front
    ctx.fillStyle=pal.front;
    poly([[sx-half,sy],[sx+half,sy],[sx+half,sy+blockH],[sx-half,sy+blockH]]); ctx.fill();
    // top
    ctx.fillStyle=pal.top;
    poly([[sx-half,sy],[sx+half,sy],[sx+half+depthX,sy+depthY],[sx-half+depthX,sy+depthY]]); ctx.fill();
    // top edge highlight
    ctx.globalAlpha=0.5; ctx.strokeStyle="#ffffff"; ctx.lineWidth=1.5*S;
    ctx.beginPath(); ctx.moveTo(sx-half,sy); ctx.lineTo(sx+half,sy); ctx.stroke(); ctx.globalAlpha=1;
    // gem
    if(st.gem && !st.gemGot){ drawGem(sx+depthX*0.5, sy+depthY*0.5 - 20*S - Math.sin(performance.now()/300+i)*3*S); }
  }
  function drawGem(x,y){
    var r=9*S;
    ctx.save(); ctx.translate(x,y);
    ctx.globalAlpha=0.35; ctx.fillStyle="#8ef0ff";
    ctx.beginPath(); ctx.arc(0,0,r*1.8,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle="#33d6ff";
    poly([[0,-r],[r*0.8,-r*0.2],[0,r],[-r*0.8,-r*0.2]]); ctx.fill();
    ctx.fillStyle="#bff4ff";
    poly([[0,-r],[r*0.8,-r*0.2],[0,0],[-r*0.8,-r*0.2]]); ctx.fill();
    ctx.fillStyle="#ffffff"; ctx.globalAlpha=0.9;
    poly([[0,-r],[r*0.28,-r*0.35],[0,0],[-r*0.28,-r*0.35]]); ctx.fill(); ctx.globalAlpha=1;
    ctx.restore();
  }

  // ---- draw: princess (vector) ----
  function drawPrincess(fx,fy,dir,hop,sq,over){
    var h=charH();
    ctx.save();
    ctx.translate(fx,fy);
    if(over){ ctx.translate(fallX,fallY); ctx.rotate(fallRot*dir); }
    else { ctx.translate(0,-hop); }
    ctx.scale(dir,1);
    var sxSq=1+sq*0.5, sySq=1-sq*0.5;
    ctx.scale(sxSq,sySq);
    // walk bob legs
    var bob=Math.sin(walkPhase*1.5)*0; // subtle
    // shadow handled outside
    // dress
    ctx.fillStyle="#ff77b0";
    poly([[-h*0.30,-h*0.02],[h*0.30,-h*0.02],[h*0.16,-h*0.42],[-h*0.16,-h*0.42]]); ctx.fill();
    ctx.fillStyle="#ff9ec7";
    poly([[-h*0.30,-h*0.02],[0,-h*0.02],[-h*0.02,-h*0.42],[-h*0.16,-h*0.42]]); ctx.fill();
    // dress trim
    ctx.strokeStyle="#ffd6e8"; ctx.lineWidth=2*S;
    ctx.beginPath(); ctx.moveTo(-h*0.30,-h*0.02); ctx.lineTo(h*0.30,-h*0.02); ctx.stroke();
    // arms
    ctx.fillStyle="#ffe0c2";
    ctx.beginPath(); ctx.arc(h*0.22,-h*0.30,h*0.05,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(-h*0.22,-h*0.30,h*0.05,0,7); ctx.fill();
    // head
    var hy=-h*0.58, hr=h*0.20;
    // hair back
    ctx.fillStyle="#7a4a2b";
    ctx.beginPath(); ctx.arc(0,hy,hr*1.18,0,7); ctx.fill();
    // face
    ctx.fillStyle="#ffe7cf";
    ctx.beginPath(); ctx.arc(0,hy,hr,0,7); ctx.fill();
    // hair fringe
    ctx.fillStyle="#8a5533";
    ctx.beginPath(); ctx.arc(0,hy-hr*0.35,hr*0.95,Math.PI,2*Math.PI); ctx.fill();
    // eyes
    ctx.fillStyle="#3a2a2a";
    ctx.beginPath(); ctx.arc(hr*0.32,hy+hr*0.05,hr*0.13,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(-hr*0.05,hy+hr*0.05,hr*0.13,0,7); ctx.fill();
    // cheeks
    ctx.fillStyle="#ff9ab0"; ctx.globalAlpha=0.6;
    ctx.beginPath(); ctx.arc(hr*0.45,hy+hr*0.35,hr*0.12,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(-hr*0.28,hy+hr*0.35,hr*0.12,0,7); ctx.fill();
    ctx.globalAlpha=1;
    // smile
    ctx.strokeStyle="#c0526a"; ctx.lineWidth=1.6*S; ctx.beginPath();
    ctx.arc(hr*0.12,hy+hr*0.32,hr*0.22,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    // crown
    ctx.fillStyle="#ffd35a"; ctx.strokeStyle="#e0a81e"; ctx.lineWidth=1.2*S;
    var cyy=hy-hr*0.95, cw=hr*1.1;
    poly([[-cw*0.5,cyy+hr*0.28],[-cw*0.5,cyy],[-cw*0.25,cyy+hr*0.16],[0,cyy-hr*0.12],[cw*0.25,cyy+hr*0.16],[cw*0.5,cyy],[cw*0.5,cyy+hr*0.28]]);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle="#ff5fa2"; ctx.beginPath(); ctx.arc(0,cyy-hr*0.06,hr*0.09,0,7); ctx.fill();
    ctx.restore();
  }
  function charH(){ return 62*S; }

  // ---- draw: UI ----
  function drawUI(){
    if(STATE!=="title"){
      // score center-top
      ctx.textAlign="center"; ctx.textBaseline="alphabetic";
      ctx.fillStyle="rgba(255,255,255,0.9)";
      ctx.font="bold "+(52*S)+"px sans-serif";
      ctx.strokeStyle="rgba(214,51,132,0.9)"; ctx.lineWidth=5*S;
      ctx.strokeText(String(score), cx, 66*S);
      ctx.fillText(String(score), cx, 66*S);

      // energy bar
      var bw=Math.min(W*0.62,300*S), bh=16*S, bx=cx-bw/2, by=86*S;
      ctx.fillStyle="rgba(0,0,0,0.18)"; rr(bx,by,bw,bh,bh/2); ctx.fill();
      var r=Math.max(0,energy);
      var col = r>0.5 ? "#57e08a" : (r>0.25 ? "#ffb347" : "#ff5a6e");
      if(r<=0.25){ ctx.globalAlpha=0.6+0.4*Math.sin(performance.now()/120); }
      ctx.fillStyle=col; rr(bx,by,Math.max(bh,bw*r),bh,bh/2); ctx.fill(); ctx.globalAlpha=1;
      ctx.strokeStyle="rgba(255,255,255,0.8)"; ctx.lineWidth=2*S; rr(bx,by,bw,bh,bh/2); ctx.stroke();

      // best
      ctx.textAlign="left"; ctx.fillStyle="rgba(255,255,255,0.85)";
      ctx.font="bold "+(15*S)+"px sans-serif";
      ctx.fillText("\uCD5C\uACE0 "+best, 16*S, 26*S);
    }

    // mute
    var mr=22*S, mx=W-mr-14*S, my=mr+14*S;
    ctx.fillStyle="rgba(255,255,255,0.75)"; ctx.beginPath(); ctx.arc(mx,my,mr,0,7); ctx.fill();
    ctx.fillStyle="#d63384"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="bold "+(18*S)+"px sans-serif"; ctx.fillText(muted?"\u00D7":"\u266A", mx, my+1*S);

    // control buttons (visual affordance)
    if(STATE==="play"){
      var r2=30*S, y2=H-r2-24*S;
      drawCtrlBtn(cx-W*0.28, y2, r2, "\u21BA", "\uBC29\uD5A5");
      drawCtrlBtn(cx+W*0.28, y2, r2, "\u2191", "\uC9C1\uC9C4");
    }
  }
  function drawCtrlBtn(x,y,r,sym,label){
    ctx.globalAlpha=0.28; ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.globalAlpha=1;
    ctx.strokeStyle="rgba(255,255,255,0.6)"; ctx.lineWidth=2*S; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.9)"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="bold "+(26*S)+"px sans-serif"; ctx.fillText(sym,x,y);
  }

  function drawHints(){
    if(hintLeft<=0 || STATE!=="play") return;
    var ni=pos+1; if(ni>=stairs.length) return;
    var nx=stairs[ni]; var pu=stairScreen(ni);
    var turn = nx.dir !== face;
    ctx.globalAlpha=0.6+0.3*Math.sin(performance.now()/160);
    ctx.fillStyle= turn ? "#7a5bff" : "#ff4f9a";
    ctx.font="bold "+(30*S)+"px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(turn? "\u21BA":"\u2191", pu.x+depthX*0.5, pu.y+depthY*0.5 - 42*S);
    ctx.globalAlpha=1;
  }

  function drawPops(){
    ctx.textAlign="center"; ctx.textBaseline="middle";
    for(var i=0;i<pops.length;i++){ var p=pops[i];
      ctx.globalAlpha=Math.max(0,1-p.t/p.life);
      ctx.fillStyle=p.c; ctx.font="bold "+(22*S)+"px sans-serif"; ctx.fillText(p.txt,p.x,p.y);
    } ctx.globalAlpha=1;
  }
  function drawParticles(){
    for(var i=0;i<particles.length;i++){ var q=particles[i];
      ctx.globalAlpha=Math.max(0,1-q.t/q.life); ctx.fillStyle=q.c;
      ctx.beginPath(); ctx.arc(q.x,q.y,q.r,0,7); ctx.fill(); }
    for(var g=0;g<gemsFx.length;g++){ var gg=gemsFx[g];
      ctx.globalAlpha=Math.max(0,1-gg.t/gg.life); ctx.fillStyle="#8ef0ff";
      ctx.beginPath(); ctx.arc(gg.x,gg.y,gg.r,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
  }

  function drawTitle(){
    ctx.fillStyle="rgba(42,24,48,0.15)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center"; ctx.textBaseline="middle";
    // big character
    drawPrincessShadow(cx, H*0.40);
    drawPrincess(cx, H*0.40, 1, 6*S*(0.5+0.5*Math.sin(performance.now()/500)), 0, false);
    ctx.fillStyle="#ffffff"; ctx.strokeStyle="rgba(214,51,132,0.9)"; ctx.lineWidth=6*S;
    ctx.font="bold "+(46*S)+"px sans-serif";
    ctx.strokeText("\uACF5\uC8FC\uB2D8\uC758 \uACC4\uB2E8", cx, H*0.20);
    ctx.fillText("\uACF5\uC8FC\uB2D8\uC758 \uACC4\uB2E8", cx, H*0.20);
    var bl=0.55+0.45*Math.sin(performance.now()/350);
    ctx.globalAlpha=bl; ctx.fillStyle="#fff"; ctx.font="bold "+(22*S)+"px sans-serif";
    ctx.fillText("\uD654\uBA74\uC744 \uD0ED\uD558\uBA74 \uC2DC\uC791", cx, H*0.58); ctx.globalAlpha=1;
    ctx.fillStyle="rgba(255,255,255,0.92)"; ctx.font=(16*S)+"px sans-serif";
    ctx.fillText("\uC624\uB978\uCABD \uD0ED = \uADF8\uB300\uB85C \uC62C\uB77C\uAC00\uAE30 (\u2191)", cx, H*0.66);
    ctx.fillText("\uC67C\uCABD \uD0ED = \uBC29\uD5A5 \uBC14\uAFB8\uAE30 (\u21BA)", cx, H*0.705);
    ctx.fillText("\uACC4\uB2E8\uC774 \uAEC5\uC73C\uBA74 \uBC29\uD5A5\uC744 \uBC14\uAFB8\uC138\uC694!", cx, H*0.755);
    if(best>0){ ctx.fillStyle="#ffe082"; ctx.font="bold "+(18*S)+"px sans-serif";
      ctx.fillText("\uCD5C\uACE0 \uAE30\uB85D  "+best, cx, H*0.82); }
  }

  function medal(){ if(score>=100) return "\uAE08"; if(score>=50) return "\uC740"; if(score>=20) return "\uB3D9"; return ""; }
  function drawOver(){
    ctx.fillStyle="rgba(60,20,45,0.4)"; ctx.fillRect(0,0,W,H);
    var cw=Math.min(W*0.82,340*S), ch=270*S, x=cx-cw/2, y=H*0.5-ch/2;
    ctx.fillStyle="#fff4fa"; rr(x,y,cw,ch,24*S); ctx.fill();
    ctx.strokeStyle="#ffb3d6"; ctx.lineWidth=3*S; ctx.stroke();
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="#d63384"; ctx.font="bold "+(30*S)+"px sans-serif";
    ctx.fillText("\uAC8C\uC784 \uC624\uBC84", cx, y+42*S);
    // crown/star
    drawGem(cx, y+96*S);
    ctx.fillStyle="#c2185b"; ctx.font="bold "+(46*S)+"px sans-serif";
    ctx.fillText(String(score), cx, y+150*S);
    var m=medal();
    ctx.fillStyle="#a24d78"; ctx.font="bold "+(16*S)+"px sans-serif";
    ctx.fillText((score>=best&&score>0?"\uC0C8 \uCD5C\uACE0 \uAE30\uB85D! ":"\uCD5C\uACE0 ")+best + (m?("  \u00B7  "+m+"\uBA54\uB2EC"):""), cx, y+182*S);
    var bl= performance.now()-overAt>500 ? (0.5+0.5*Math.sin(performance.now()/300)) : 0.25;
    ctx.globalAlpha=bl; ctx.fillStyle="#ff5fa2"; ctx.font="bold "+(18*S)+"px sans-serif";
    ctx.fillText("\uD0ED\uD574\uC11C \uB2E4\uC2DC \uD558\uAE30", cx, y+224*S); ctx.globalAlpha=1;
  }

  function drawPrincessShadow(fx,fy){
    ctx.globalAlpha=0.16; ctx.fillStyle="#000";
    ctx.beginPath(); ctx.ellipse(fx,fy,charH()*0.28,charH()*0.09,0,0,7); ctx.fill(); ctx.globalAlpha=1;
  }

  // ---- render ----
  function render(){
    ctx.save();
    if(shake>0){ var mag=8*S*shake; ctx.translate((Math.random()-0.5)*mag,(Math.random()-0.5)*mag); }
    drawBackground();
    // stairs from far (high) to near (low)
    var start=Math.max(0,pos-5), end=Math.min(stairs.length-1,pos+13);
    for(var i=end;i>=start;i--) drawBlock(i);
    // character shadow + body (not on title screen)
    if(STATE!=="title"){
      var f=feet();
      drawPrincessShadow(f.x, f.y);
      var hop=Math.sin(hopT*Math.PI)*16*S;
      drawPrincess(f.x, f.y, face, hop, squash, STATE==="over");
      drawParticles();
      drawHints();
      drawPops();
    }
    drawUI();
    ctx.restore();
    if(flashT>0){ ctx.globalAlpha=Math.max(0,flashT/0.25)*0.6; ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
    if(STATE==="title") drawTitle();
    else if(STATE==="over") drawOver();
  }

  // ---- color utils ----
  function mix(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
  function rgb(c){ return "rgb("+(c[0]|0)+","+(c[1]|0)+","+(c[2]|0)+")"; }

  // ---- loop ----
  function loop(t){
    if(!lastTime) lastTime=t;
    var dt=(t-lastTime)/1000; lastTime=t; if(dt>0.05) dt=0.05;
    update(dt); render();
    requestAnimationFrame(loop);
  }

  resize();
  resetGame(); STATE="title";
  requestAnimationFrame(loop);

  // debug hook (harmless)
  try{ window.__PS={ act:doAction, info:function(){return {state:STATE,pos:pos,face:face,next:stairs[pos+1]?stairs[pos+1].dir:0};}, frame:function(ts){loop(ts);} }; }catch(e){}
})();
</script>
